<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Proyecto Final M2</title>
</head>
<body>
    <main>
        <section>
           <div class="container d-flex flex-column justify-content-center">
                <h1 class="text-center mt-3">Calculadora</h1>
                <div class="card shadow mt-3 mb-1">
                    <input id="primerValor" class="form-control" type="number" placeholder="Ingrese un valor">
                </div>
                <div class="mb-1">
                    <select class="form-select"   id="operador">
                        <option selected value="">Seleccione un operador</option>
                        <option value="+">Suma(+)</option>
                        <option value="-">Resta(-)</option>
                        <option value="*">Multiplicación(*)</option>
                        <option value="/">División(/)</option>
                    </select>
                </div>
                <div class="card shadow mb-3">
                    <input id="segundoValor" class="form-control" type="number" placeholder="Ingrese un valor">
                </div>
                <div class="mb-3"><button id="resolver" type="button" class="btn btn-success">Resolver</button></div>
                <div class="mb-2"><h3 class="text-center">Historial</h3></div>
                <div >
                    <ul id="historial" class="list-group mb-3">

                    </ul>
                </div>
           </div> 
        </section>
        <section>
            <div class="container">
                <h1 class="text-center">Galeria de imagenes</h1>
                <div class="d-flex flex-column justify-content-center align-items-center">
                    <div class="row">
                        <div class="col">
                            <div class="img-contenedor"><button><img id="btnimg1" class="img-fluid img-thumbnail" src="./Assets/img1.png" alt="imagen"></button></div>
                            <div class="img-contenedor"><button><img id="btnimg2" class="img-fluid img-thumbnail" src="./Assets/img2.png" alt="imagen"></button></div>
                            <div class="img-contenedor"><button><img id="btnimg3" class="img-fluid img-thumbnail" src="./Assets/img3.png" alt="imagen"></button></div>
                        </div>
                        <div class="col">
                            <div class="img-contenedor"><button><img id="btnimg4" class="img-fluid img-thumbnail" src="./Assets/img4.png" alt="imagen"></button></div>
                            <div class="img-contenedor"><button><img id="btnimg5" class="img-fluid img-thumbnail" src="./Assets/img5.png" alt="imagen"></button></div>
                            <div class="img-contenedor"><button><img id="btnimg6" class="img-fluid img-thumbnail" src="./Assets/img6.png" alt="imagen"></button></div>
                        </div>
                        <div class="col">
                            <div class="img-contenedor"><button><img id="btnimg7" class="img-fluid img-thumbnail" src="./Assets/img7.png" alt="imagen"></button></div>
                            <div class="img-contenedor"><button><img id="btnimg8" class="img-fluid img-thumbnail" src="./Assets/img8.png" alt="imagen"></button></div>
                            <div class="img-contenedor"><button><img id="btnimg9" class="img-fluid img-thumbnail" src="./Assets/img9.png" alt="imagen"></button></div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="d-flex flex-column justify-content-center align-items-center " id="imgGrandeContenedor">

                    </div>
                </div>
            </div>
        </section>
    </main>
                    
                   
                    




    <script src="./js/app.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
</body>
</html>
