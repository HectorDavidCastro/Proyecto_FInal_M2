<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/estilos.css">
    <title>Proyecto Final M2</title>
</head>
<body>
    <main>
        <section>
            <div class="container d-flex flex-column justify-content-center align-items-center">
                <div class="contenedor-calculadora">
                    <h1 class="titulo">Calculadora</h1>
                    <div class="contedor-input">
                        <input class="input" type="number">
                    </div>
                    <div class="row">
                        <div class="d-flex flex-row">
                            <div><button class="btn btn-warning" type="button">7</button></div>
                            <div><button class="btn btn-warning" type="button">8</button></div>
                            <div><button class="btn btn-warning" type="button">9</button></div>
                            <div><button class="btn btn-warning" type="button">/</button></div>
                        </div>
                        <div class="d-flex flex-row">
                            <div><button class="btn btn-warning" type="button">4</button></div>
                            <div><button class="btn btn-warning" type="button">5</button></div>
                            <div><button class="btn btn-warning" type="button">6</button></div>
                            <div><button class="btn btn-warning" type="button">*</button></div>
                        </div>
                        <div class="d-flex flex-row">
                            <div><button class="btn btn-warning" type="button">1</button></div>
                            <div><button class="btn btn-warning" type="button">2</button></div>
                            <div><button class="btn btn-warning" type="button">3</button></div>
                            <div><button class="btn btn-warning" type="button">+</button></div>
                        </div>
                        <div class="d-flex flex-row">
                            <div><button class="btn btn-warning" type="button">.</button></div>
                            <div><button class="btn btn-warning" type="button">0</button></div>
                            <div><button class="btn btn-warning" type="button">-</button></div>
                            <div><button class="btn btn-warning" type="button">=</button></div>
                        </div>
                    </div>
                </div>
            </div> 
        </section>
        <section>
            <div class="container  d-flex flex-column justify-content-center align-items-center">
                <div class="row">
                    <h1 class="titulo">Galeria de imagenes</h1>
                    <div class="col">
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                    </div>
                    <div class="col">
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                    </div>
                    <div class="col">
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                        <div><img src="https://placehold.co/100x100" alt="imagen"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>





    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
</body>
</html>
